spring:
  application:
    name: kafka-lag-autoscaler
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: kafka-lag-autoscaler

kafka-lag-autoscaler:
  consumer-group: ${KAFKA_CONSUMER_GROUP:my-consumer-group}
  topic: ${KAFKA_TOPIC:my-topic}
  min-replicas: ${MIN_REPLICAS:1}
  max-replicas: ${MAX_REPLICAS:10}
  lag-threshold: ${LAG_THRESHOLD:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: ${SERVER_PORT:8080}
